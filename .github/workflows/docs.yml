name: Actualizar navegación de la documentación

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sidebar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerar _sidebar.md
        run: node scripts/generate-sidebar.mjs

      - name: Commitear si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _sidebar.md
          git diff --cached --quiet || git commit -m "chore: regenerar navegación de la documentación [skip ci]"
          git push
